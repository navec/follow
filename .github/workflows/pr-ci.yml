name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t follow-api:pr-${{ github.event.pull_request.number }} .

  unit-tests:
    name: Unit Tests
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  integration-tests:
    name: Integration Tests
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/follow
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/follow_test
      JWT_SECRET: ci-secret
      JWT_EXPIRES_IN: 1h
      PORT: 3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Create test database
        run: |
          node --input-type=module <<'NODE'
          import pg from 'pg';

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          let client;

          for (let i = 0; i < 20; i += 1) {
            try {
              client = new pg.Client({
                connectionString: 'postgres://postgres:postgres@localhost:5432/postgres'
              });
              await client.connect();
              break;
            } catch {
              if (client) {
                try { await client.end(); } catch {}
              }
              await sleep(2000);
            }
          }

          if (!client) {
            throw new Error('Postgres service did not become ready');
          }

          const exists = await client.query(
            \"SELECT 1 FROM pg_database WHERE datname = 'follow_test' LIMIT 1\"
          );

          if (exists.rowCount === 0) {
            await client.query('CREATE DATABASE follow_test');
          }

          await client.end();
          NODE
      - run: npm run test:integration

  coverage-new-code:
    name: Coverage (Changed Files >= 90%)
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/follow
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/follow_test
      JWT_SECRET: ci-secret
      JWT_EXPIRES_IN: 1h
      PORT: 3000
      NODE_ENV: test
      GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      MIN_NEW_CODE_COVERAGE: "90"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Create test database
        run: |
          node --input-type=module <<'NODE'
          import pg from 'pg';

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          let client;

          for (let i = 0; i < 20; i += 1) {
            try {
              client = new pg.Client({
                connectionString: 'postgres://postgres:postgres@localhost:5432/postgres'
              });
              await client.connect();
              break;
            } catch {
              if (client) {
                try { await client.end(); } catch {}
              }
              await sleep(2000);
            }
          }

          if (!client) {
            throw new Error('Postgres service did not become ready');
          }

          const exists = await client.query(
            "SELECT 1 FROM pg_database WHERE datname = 'follow_test' LIMIT 1"
          );

          if (exists.rowCount === 0) {
            await client.query('CREATE DATABASE follow_test');
          }

          await client.end();
          NODE
      - run: npm run test:coverage
      - run: node scripts/check-changed-files-coverage.mjs
